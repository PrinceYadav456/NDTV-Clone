<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">Lok TV logo</title>
  <desc id="desc">Circular red and white Lok TV emblem</desc>
  <defs>
    <linearGradient id="ringShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#171717" />
      <stop offset="100%" stop-color="#2a2a2a" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <circle cx="400" cy="400" r="390" fill="url(#ringShade)" stroke="#ff0000" stroke-width="14" />

  <path
    d="M95 470
       C 95 415, 140 375, 195 375
       C 210 330, 255 300, 305 305
       C 335 260, 385 240, 440 250
       C 480 210, 550 205, 600 250
       C 665 252, 715 300, 720 365
       C 755 385, 780 420, 780 470
       L 780 655
       C 780 720, 730 770, 665 770
       L 140 770
       C 70 770, 20 720, 20 655
       L 20 470 Z"
    fill="#ffffff"
    stroke="#ff0000"
    stroke-width="8"
    filter="url(#softShadow)"
  />

  <path
    d="M20 490 L780 490 L780 655
       C 780 720, 730 770, 665 770
       L140 770
       C70 770, 20 720, 20 655 Z"
    fill="#ef0000"
  />

  <text x="400" y="415" text-anchor="middle" fill="#e70000" font-size="170" font-weight="700" font-family="Noto Sans Devanagari, Mangal, sans-serif">
    लोक
  </text>

  <text x="400" y="675" text-anchor="middle" fill="#ffffff" font-size="250" font-weight="700" font-family="Georgia, Times New Roman, serif" letter-spacing="3">
    TV
  </text>
</svg>
